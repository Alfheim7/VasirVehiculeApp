<ion-content [fullscreen]="true" class="welcome-screen">
  <div class="pattern"></div>
  <main>
    <div class="brand">Vasir</div>
    <img src="assets/vasir-logo.svg" alt="Logo Vasir" class="logo" />
    <h1>Tu bitácora<br />inteligente vehicular</h1>
    <p>Controla mantenimientos, documentos y alertas desde la palma de tu mano.</p>
    <div class="actions">
      <ion-button expand="block" routerLink="/login">Iniciar sesión</ion-button>
      <ion-button expand="block" fill="outline" color="light" routerLink="/register">Crear cuenta</ion-button>
    </div>
  </main>
</ion-content>
